# GitHub Actions — PR Validation
# Triggers on PR raised against dev or main branch
# Runs: databricks bundle validate to check DAB config

name: PR Validation

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  validate:
    name: Databricks Bundle Validate
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2 — Install Databricks CLI
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      # Step 3 — Validate Bundle for Dev (PR to dev branch)
      - name: Validate Bundle - Dev
        if: github.base_ref == 'dev'
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks bundle validate --target dev

      # Step 4 — Validate Bundle for Prod (PR to main branch)
      - name: Validate Bundle - Prod
        if: github.base_ref == 'main'
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks bundle validate --target prod