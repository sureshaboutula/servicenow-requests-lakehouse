# Databricks Asset Bundle — servicenow-requests-lakehouse
# See https://docs.databricks.com/dev-tools/bundles/index.html

bundle:
  name: servicenow-requests-lakehouse
  uuid: 5e195bbb-0b94-4f85-97c0-ee7bbb4d852f

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations
variables:
  env:
    description: Deployment environment (dev or prod)
    default: dev
  schema_bronze:
    description: "bronze layer schema"
    default: "bronze"
  schema_silver:
    description: "silver layer schema"
    default: "silver"
  schema_gold:
    description: "gold layer schema"
    default: "gold"

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-bf7042a0-9c61.cloud.databricks.com
    variables:
      env: dev

  prod:
    mode: production
    workspace:
      host: https://dbc-bf7042a0-9c61.cloud.databricks.com
      root_path: /Workspace/Users/aboutula.suresh@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      env: prod
    permissions:
      - user_name: aboutula.suresh@gmail.com
        level: CAN_MANAGE